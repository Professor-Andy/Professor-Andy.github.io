function Navigation(id, pagePath) {
    const ids = ['contact', 'donate', 'volunteer', 'info'];

    // remove active from all nav items
    ids.forEach(navId => {
        document.getElementById(navId).classList.remove("active");
    });

    // add active to the clicked one
    document.getElementById(id).classList.add("active");

    // load the new page content
    fetch(pagePath)
        .then(res => res.text())
        .then(html => {
            document.getElementById("Page").innerHTML = html;
	    initCarousel();
        });
}

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault(); // stop page reload

    const message = document.getElementById("msg").value;

    // Replace with your email address
    const emailTo = "youremail@example.com";

    // Build the mailto link
    const mailtoLink =
        `mailto:${emailTo}?subject=Message from Website&body=${encodeURIComponent(message)}`;

    // Open the user's email client
    window.location.href = mailtoLink;
});
